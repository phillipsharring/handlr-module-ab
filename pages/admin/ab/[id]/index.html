<layout name="admin" title="A/B Test Results" />

<div class="max-w-4xl mx-auto" data-requires-auth>
    <div class="flex items-center gap-3 mb-6">
        <a href="/admin/ab/" class="text-slate-400 hover:text-slate-600">&larr; All Tests</a>
    </div>

    <div id="ab-test-detail"></div>
</div>

<script>
window.onReady(function() {
    var params = App.getRouteParams('/admin/ab/[id]/');
    if (!params || !params.id) return;

    fetch('/api/admin/ab/' + params.id, { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            var d = res.data;
            if (!d) return;

            var test = d.test;
            var results = d.results;
            var el = document.getElementById('ab-test-detail');

            var html = '<div class="flex items-center gap-3 mb-6">';
            html += '<h1 class="text-xl font-bold text-slate-700">' + App.escapeHtml(test.name) + '</h1>';
            if (test.status === 'active') {
                html += '<span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-medium">Active</span>';
                html += '<button type="button" class="text-xs border rounded px-2 py-1 text-slate-500 hover:text-slate-700" data-ab-action="pause">Pause</button>';
                html += '<button type="button" class="text-xs border rounded px-2 py-1 text-slate-500 hover:text-slate-700" data-ab-action="complete">Complete</button>';
            } else if (test.status === 'paused') {
                html += '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-medium">Paused</span>';
                html += '<button type="button" class="text-xs border rounded px-2 py-1 text-slate-500 hover:text-slate-700" data-ab-action="resume">Resume</button>';
            } else {
                html += '<span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded font-medium">Completed</span>';
            }
            html += '</div>';

            html += '<p class="text-sm text-slate-500 mb-6">Variants: ' + test.variants.join(', ') + '</p>';

            // Build results table
            if (results.length) {
                // Group by event
                var events = {};
                results.forEach(function(r) {
                    if (!events[r.event]) events[r.event] = {};
                    events[r.event][r.variant] = { count: parseInt(r.count), unique: parseInt(r.unique_sessions) };
                });

                html += '<table class="w-full text-sm border-collapse">';
                html += '<thead><tr class="border-b">';
                html += '<th class="text-left py-2 px-3 text-slate-500 font-medium">Event</th>';
                test.variants.forEach(function(v) {
                    html += '<th class="text-right py-2 px-3 text-slate-500 font-medium">Variant ' + v.toUpperCase() + '</th>';
                });
                html += '</tr></thead><tbody>';

                Object.keys(events).forEach(function(eventName) {
                    html += '<tr class="border-b">';
                    html += '<td class="py-2 px-3 text-slate-800 font-medium">' + App.escapeHtml(eventName) + '</td>';
                    test.variants.forEach(function(v) {
                        var data = events[eventName][v];
                        if (data) {
                            html += '<td class="py-2 px-3 text-right tabular-nums">' + data.count + ' <span class="text-slate-400">(' + data.unique + ' unique)</span></td>';
                        } else {
                            html += '<td class="py-2 px-3 text-right text-slate-300">0</td>';
                        }
                    });
                    html += '</tr>';
                });

                html += '</tbody></table>';
            } else {
                html += '<div class="text-center py-12 text-slate-400"><p>No events recorded yet.</p></div>';
            }

            el.innerHTML = html;

            // Action buttons
            el.addEventListener('click', function(e) {
                var btn = e.target.closest('[data-ab-action]');
                if (!btn) return;
                var action = btn.getAttribute('data-ab-action');
                var status = action === 'pause' ? 'paused' : action === 'resume' ? 'active' : 'completed';
                fetch('/api/admin/ab/' + params.id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ status: status })
                }).then(function(r) {
                    if (r.ok) window.location.reload();
                });
            });
        });
});
</script>
